<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{DOCUMENT_TITLE}} — {{PROJECT_NAME}}</title>
  <style>
{{CSS}}

/* ディスカッション資料固有スタイル */
body {
  max-width: none;
}

.topic-card {
  border: 1px solid var(--color-border);
  border-radius: 12px;
  margin: 24px 0;
  overflow: hidden;
}

.topic-card .topic-header {
  background-color: var(--color-primary);
  color: #ffffff;
  padding: 14px 20px;
  font-size: 1.15em;
  font-weight: 700;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topic-card .topic-header .tag {
  font-size: 0.7em;
  background-color: rgba(255,255,255,0.25);
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 400;
}

.topic-card .topic-body {
  padding: 20px;
}

.topic-card .topic-body h4 {
  color: var(--color-primary);
  margin-top: 16px;
  margin-bottom: 8px;
}

.topic-card .topic-body h4:first-child {
  margin-top: 0;
}

/* 背景・コンテキスト */
.context-box {
  background-color: var(--color-bg-sub);
  border-left: 4px solid var(--color-primary-light);
  padding: 12px 16px;
  margin: 12px 0;
  border-radius: 0 8px 8px 0;
  font-size: 0.95em;
}

/* 選択肢カード */
.options {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 16px;
  margin: 16px 0;
}

.option-card {
  border: 2px solid var(--color-border);
  border-radius: 10px;
  padding: 16px;
  transition: border-color 0.2s;
}

.option-card:hover {
  border-color: var(--color-primary-light);
}

.option-card .option-label {
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 8px;
  font-size: 1.05em;
}

.option-card.recommended {
  border-color: var(--color-primary);
  background-color: var(--color-primary-lighter);
}

.option-card.recommended .option-label::after {
  content: ' ★推奨';
  font-size: 0.75em;
  color: var(--color-primary);
}

.option-card ul {
  margin: 8px 0;
  padding-left: 1.2em;
  font-size: 0.9em;
}

/* 論点・質問 */
.question-box {
  background-color: #fffbeb;
  border: 1px solid var(--color-accent);
  border-radius: 8px;
  padding: 14px 18px;
  margin: 12px 0;
}

.question-box .q {
  font-weight: 700;
  color: var(--color-primary-dark);
}

/* 決定欄 */
.decision-box {
  border: 2px dashed var(--color-border);
  border-radius: 8px;
  padding: 14px 18px;
  margin: 12px 0;
  min-height: 60px;
}

.decision-box .placeholder {
  color: var(--color-text-light);
  font-style: italic;
}

/* ページ区切り */
.page-break {
  page-break-before: always;
  border-top: 2px solid var(--color-border);
  margin: 40px 0;
}

/* アジェンダ（打合せ用） */
.agenda {
  background-color: var(--color-bg-sub);
  border-radius: 8px;
  padding: 20px 24px;
  margin: 24px 0;
}

.agenda h3 {
  margin-top: 0;
  border-left: none;
  padding-left: 0;
}

.agenda ol {
  line-height: 2.2;
}

.agenda .time {
  color: var(--color-text-light);
  font-size: 0.85em;
}
  </style>
</head>
<body>

<div class="cover" style="padding: 40px 0 30px 0;">
  <h1>{{DOCUMENT_TITLE}}</h1>
  <div class="subtitle">{{PROJECT_NAME}}</div>
  <div class="meta">
    {{DATE}} | {{PARTICIPANTS}}
  </div>
</div>

{{CONTENT}}

<div class="doc-footer">
  {{FOOTER_TEXT}}
</div>

</body>
</html>
